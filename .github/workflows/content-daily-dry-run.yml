name: Content Daily Dry-Run

# 毎日の Threads-first dry-run サニティチェック。
# 実投稿・実ダウンロード・実アップロードは一切行わない。
# Sheets verify + queue worker dry-run + refill dry-run + publisher dry-run のみ。
on:
  schedule:
    - cron: "0 1 * * *"  # UTC 01:00 = JST 10:00
  workflow_dispatch:
    inputs:
      account_id:
        description: "チェック対象アカウントID"
        required: false
        default: "night_scout"
        type: choice
        options:
          - "night_scout"
          - "liver_manager"

# 安全制約: 全フラグを明示的にfalseで固定（schedule実行時も同様）
env:
  PUBLISH_ENABLED: "false"
  ALLOW_REAL_X_POST: "false"
  ALLOW_REAL_THREADS_POST: "false"
  ALLOW_TRANSCRIPTION_API: "false"
  ALLOW_CLOUDINARY_UPLOAD: "false"
  DRY_RUN: "true"
  MOCK_LLM: "false"
  MOCK_SHEETS: "false"

jobs:
  daily-dry-run:
    name: Daily Dry-Run (${{ github.event.inputs.account_id || 'night_scout' }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      ACCOUNT_ID: ${{ github.event.inputs.account_id || 'night_scout' }}
      GCP_SA_JSON_BASE64: ${{ secrets.GCP_SA_JSON_BASE64 || secrets.SA_JSON_BASE64 }}
      SA_JSON_BASE64: ${{ secrets.SA_JSON_BASE64 || secrets.GCP_SA_JSON_BASE64 }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID || secrets.SNS_MASTER_SHEET_ID }}
      SNS_MASTER_SHEET_ID: ${{ secrets.SNS_MASTER_SHEET_ID || secrets.SPREADSHEET_ID }}
      THREADS_ACCESS_TOKEN_NIGHT_SCOUT: ${{ secrets.THREADS_ACCESS_TOKEN_NIGHT_SCOUT }}
      THREADS_USER_ID_NIGHT_SCOUT: ${{ secrets.THREADS_USER_ID_NIGHT_SCOUT }}
      THREADS_ACCESS_TOKEN_LIVER_MANAGER: ${{ secrets.THREADS_ACCESS_TOKEN_LIVER_MANAGER }}
      THREADS_USER_ID_LIVER_MANAGER: ${{ secrets.THREADS_USER_ID_LIVER_MANAGER }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Guard account
        run: |
          if [ "$ACCOUNT_ID" != "night_scout" ] && [ "$ACCOUNT_ID" != "liver_manager" ]; then
            echo "[BLOCKED] unsupported account"
            exit 1
          fi

      - name: Sheets verify
        run: |
          python3 scripts/recover_production_sheets_threads_first.py --verify-only

      - name: Queue worker dry-run
        run: |
          python3 scripts/process_threads_queue.py \
            --account-id "$ACCOUNT_ID" \
            --max-posts 1 \
            --dry-run

      - name: Refill candidate dry-run
        run: |
          python3 scripts/refill_threads_queue.py \
            --account-id "$ACCOUNT_ID" \
            --count 1 \
            --dry-run

      - name: Publisher dry-run
        run: |
          python3 scripts/publish_threads_post.py \
            --account-id "$ACCOUNT_ID" \
            --text "毎日 dry-run チェック。実投稿せず、Threads投稿文の検証だけを行います。" \
            --confirm-post --dry-run
