name: Media Growth Post Liver Manager

on:
  schedule:
    # JST 18:00 target; this starts 15 minutes early and jitters into the slot.
    - cron: "45 8 * * *"
  workflow_dispatch:
    inputs:
      confirm_media_post:
        description: "Type true to post one saved approved liver_manager media asset"
        required: true
        default: "false"
      dry_run_only:
        description: "Plan only; never post"
        required: false
        default: "false"

permissions:
  contents: read
  actions: read

concurrency:
  group: sns-growth-production-liver-manager-${{ github.ref }}
  cancel-in-progress: false

env:
  ACCOUNT_ID: "liver_manager"
  PUBLISH_ENABLED: "false"
  ALLOW_REAL_THREADS_POST: "false"
  ALLOW_REAL_THREADS_VIDEO_POST: "false"
  ALLOW_MEDIA_POSTS: "false"
  ALLOW_REAL_X_POST: "false"
  ALLOW_VIDEO_DOWNLOAD: "false"
  ALLOW_VIDEO_CUT: "false"
  ALLOW_CLOUDINARY_UPLOAD: "false"
  ALLOW_TRANSCRIPTION_API: "false"

jobs:
  post-saved-approved-media:
    runs-on: [self-hosted, linux, x64, sns-growth, production]
    timeout-minutes: 45
    env:
      GCP_SA_JSON_BASE64: ${{ secrets.GCP_SA_JSON_BASE64 || secrets.SA_JSON_BASE64 }}
      SA_JSON_BASE64: ${{ secrets.SA_JSON_BASE64 || secrets.GCP_SA_JSON_BASE64 }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID || secrets.SNS_MASTER_SHEET_ID }}
      SNS_MASTER_SHEET_ID: ${{ secrets.SNS_MASTER_SHEET_ID || secrets.SPREADSHEET_ID }}
      THREADS_ACCESS_TOKEN_LIVER_MANAGER: ${{ secrets.THREADS_ACCESS_TOKEN_LIVER_MANAGER }}
      THREADS_USER_ID_LIVER_MANAGER: ${{ secrets.THREADS_USER_ID_LIVER_MANAGER }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Schedule heartbeat
        run: |
          echo "workflow=${{ github.workflow }}"
          echo "event=${{ github.event_name }}"
          echo "account=$ACCOUNT_ID"
          date -u +"utc=%Y-%m-%dT%H:%M:%SZ"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Schedule jitter
        if: github.event_name == 'schedule'
        run: |
          python3 - <<'PY'
          import random, time
          delay = random.randint(0, 1800)
          print(f"[jitter] sleeping {delay}s within ±15min window")
          time.sleep(delay)
          PY
      - name: Dry-run saved media plan
        run: python3 scripts/run_media_production_pipeline.py --account-id "$ACCOUNT_ID" --slot-id lm_1800_clip_media --post-saved-media --fallback-to-text --dry-run --use-sheets
      - name: Check free-tier media budget
        id: media_budget
        continue-on-error: true
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_media_post == 'true') && github.event.inputs.dry_run_only != 'true'
        run: python3 scripts/check_media_resource_budget.py --use-sheets --check-cloudinary --apply --confirm-resource-usage --enforce
      - name: Guard media post and kill switch
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_media_post == 'true') && github.event.inputs.dry_run_only != 'true'
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          auto = json.loads(Path("config/autonomous_mode.json").read_text())
          media = json.loads(Path("config/media_growth_engine.json").read_text())
          if auto.get("kill_switch") or not media.get("saved_media_post_enabled"):
              raise SystemExit("[BLOCKED] media post disabled by kill switch or config")
          print("[OK] saved-media post is enabled")
          PY
          for name in SNS_MASTER_SHEET_ID SA_JSON_BASE64 THREADS_ACCESS_TOKEN_LIVER_MANAGER THREADS_USER_ID_LIVER_MANAGER; do
            if [ -z "${!name}" ]; then echo "[BLOCKED] required secret is missing: $name"; exit 1; fi
          done
      - name: Post one saved approved media asset
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_media_post == 'true') && github.event.inputs.dry_run_only != 'true'
        env:
          PUBLISH_ENABLED: "true"
          ALLOW_REAL_THREADS_POST: "true"
          ALLOW_REAL_THREADS_VIDEO_POST: "true"
          ALLOW_MEDIA_POSTS: "true"
          ALLOW_REAL_X_POST: "false"
          ALLOW_VIDEO_DOWNLOAD: "false"
          ALLOW_VIDEO_CUT: "false"
          ALLOW_CLOUDINARY_UPLOAD: "false"
          ALLOW_TRANSCRIPTION_API: "false"
          FORCE_TEXT_ONLY_FALLBACK: ${{ steps.media_budget.outcome != 'success' }}
        run: python3 scripts/run_media_production_pipeline.py --account-id "$ACCOUNT_ID" --slot-id lm_1800_clip_media --post-saved-media --fallback-to-text --apply --confirm-production-media --use-sheets
      - name: Health summary
        if: always()
        run: python3 scripts/check_autonomous_health.py --account-id "$ACCOUNT_ID" --dry-run --use-sheets
