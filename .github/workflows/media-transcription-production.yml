name: Media Transcription Production

on:
  schedule:
    # JST 00:10 daily, after aftercare discovery and before media production.
    - cron: "10 15 * * *"
  workflow_dispatch:
    inputs:
      confirm_transcription:
        description: "Type true to transcribe approved liver_manager videos"
        required: true
        default: "false"
      dry_run_only:
        description: "Plan only; never download/transcribe/save"
        required: false
        default: "false"

permissions:
  contents: read
  actions: read

concurrency:
  group: sns-growth-production-${{ github.ref }}
  cancel-in-progress: false

env:
  ACCOUNT_ID: "liver_manager"
  PUBLISH_ENABLED: "false"
  ALLOW_REAL_THREADS_POST: "false"
  ALLOW_REAL_X_POST: "false"
  ALLOW_VIDEO_DOWNLOAD: "false"
  ALLOW_VIDEO_CUT: "false"
  ALLOW_CLOUDINARY_UPLOAD: "false"
  ALLOW_MEDIA_POSTS: "false"
  ALLOW_REAL_THREADS_VIDEO_POST: "false"
  ALLOW_TRANSCRIPTION_API: "false"
  ALLOW_LOCAL_TRANSCRIPTION: "false"

jobs:
  media-transcription-production:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GCP_SA_JSON_BASE64: ${{ secrets.GCP_SA_JSON_BASE64 || secrets.SA_JSON_BASE64 }}
      SA_JSON_BASE64: ${{ secrets.SA_JSON_BASE64 || secrets.GCP_SA_JSON_BASE64 }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID || secrets.SNS_MASTER_SHEET_ID }}
      SNS_MASTER_SHEET_ID: ${{ secrets.SNS_MASTER_SHEET_ID || secrets.SPREADSHEET_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Schedule heartbeat
        run: |
          echo "workflow=${{ github.workflow }}"
          echo "event=${{ github.event_name }}"
          echo "account=$ACCOUNT_ID"
          date -u +"utc=%Y-%m-%dT%H:%M:%SZ"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install faster-whisper

      - name: Guard kill switch and required secrets
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_transcription == 'true') && github.event.inputs.dry_run_only != 'true'
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          auto = json.loads(Path("config/autonomous_mode.json").read_text())
          if auto.get("kill_switch"):
              raise SystemExit("[BLOCKED] kill_switch=true")
          print("[OK] media transcription guard accepted")
          PY
          if [ -z "$SNS_MASTER_SHEET_ID" ] && [ -z "$SPREADSHEET_ID" ]; then
            echo "[BLOCKED] Sheets spreadsheet secret is missing."
            exit 1
          fi
          if [ -z "$SA_JSON_BASE64" ] && [ -z "$GCP_SA_JSON_BASE64" ]; then
            echo "[BLOCKED] Sheets service account secret is missing."
            exit 1
          fi

      - name: Dry-run transcription plan
        run: python3 scripts/transcribe_approved_source_videos.py --account-id liver_manager --use-sheets --dry-run --limit 3

      - name: Transcribe approved source videos
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_transcription == 'true') && github.event.inputs.dry_run_only != 'true'
        env:
          ALLOW_VIDEO_DOWNLOAD: "true"
          ALLOW_LOCAL_TRANSCRIPTION: "true"
          ALLOW_TRANSCRIPTION_API: "false"
          ALLOW_VIDEO_CUT: "false"
          ALLOW_CLOUDINARY_UPLOAD: "false"
          ALLOW_MEDIA_POSTS: "false"
          ALLOW_REAL_THREADS_VIDEO_POST: "false"
          PUBLISH_ENABLED: "false"
          ALLOW_REAL_THREADS_POST: "false"
          ALLOW_REAL_X_POST: "false"
        run: |
          python3 scripts/transcribe_approved_source_videos.py \
            --account-id liver_manager \
            --use-sheets \
            --apply \
            --confirm-transcribe \
            --allow-local-whisper \
            --limit 3 \
            --model-size tiny

      - name: Generate transcript-grounded clip candidates
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_transcription == 'true') && github.event.inputs.dry_run_only != 'true'
        env:
          PUBLISH_ENABLED: "false"
          ALLOW_REAL_THREADS_POST: "false"
          ALLOW_REAL_X_POST: "false"
          ALLOW_VIDEO_DOWNLOAD: "false"
          ALLOW_VIDEO_CUT: "false"
          ALLOW_CLOUDINARY_UPLOAD: "false"
          ALLOW_MEDIA_POSTS: "false"
          ALLOW_REAL_THREADS_VIDEO_POST: "false"
          ALLOW_TRANSCRIPTION_API: "false"
        run: |
          python3 scripts/run_media_growth_engine.py \
            --account-id liver_manager \
            --use-sheets \
            --apply \
            --confirm-media-growth

      - name: Health summary
        if: always()
        run: python3 scripts/check_autonomous_health.py --account-id liver_manager --dry-run
