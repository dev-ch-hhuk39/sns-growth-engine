name: Production Integrity Reconcile

# Manual-only repair for historical queue/post metadata. This workflow never
# fetches content, downloads media, uploads assets, transcribes, or publishes.
on:
  workflow_dispatch:
    inputs:
      confirm_reconcile:
        description: "Type true to repair duplicate queue IDs and annotate historical evidence"
        required: true
        default: "false"
      dry_run_only:
        description: "Run the repair plan without writing Sheets"
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: sns-growth-production-integrity-reconcile
  cancel-in-progress: false

env:
  PUBLISH_ENABLED: "false"
  ALLOW_REAL_THREADS_POST: "false"
  ALLOW_REAL_X_POST: "false"
  ALLOW_VIDEO_DOWNLOAD: "false"
  ALLOW_VIDEO_CUT: "false"
  ALLOW_CLOUDINARY_UPLOAD: "false"
  ALLOW_MEDIA_POSTS: "false"
  ALLOW_REAL_THREADS_VIDEO_POST: "false"
  ALLOW_TRANSCRIPTION_API: "false"

jobs:
  reconcile:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    env:
      GCP_SA_JSON_BASE64: ${{ secrets.GCP_SA_JSON_BASE64 || secrets.SA_JSON_BASE64 }}
      SA_JSON_BASE64: ${{ secrets.SA_JSON_BASE64 || secrets.GCP_SA_JSON_BASE64 }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID || secrets.SNS_MASTER_SHEET_ID }}
      SNS_MASTER_SHEET_ID: ${{ secrets.SNS_MASTER_SHEET_ID || secrets.SPREADSHEET_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python3 -m pip install --requirement requirements.txt
      - name: Guard Sheets credentials and confirmation
        run: |
          if [ -z "$SNS_MASTER_SHEET_ID" ] && [ -z "$SPREADSHEET_ID" ]; then
            echo "[BLOCKED] Sheets spreadsheet secret is missing."
            exit 1
          fi
          if [ -z "$SA_JSON_BASE64" ] && [ -z "$GCP_SA_JSON_BASE64" ]; then
            echo "[BLOCKED] Sheets service account secret is missing."
            exit 1
          fi
          if [ "${{ github.event.inputs.dry_run_only }}" != "true" ] && [ "${{ github.event.inputs.confirm_reconcile }}" != "true" ]; then
            echo "[BLOCKED] apply requires confirm_reconcile=true"
            exit 1
          fi
      - name: Plan integrity reconciliation
        run: python3 scripts/reconcile_production_integrity.py --dry-run
      - name: Apply integrity reconciliation
        if: github.event.inputs.dry_run_only != 'true' && github.event.inputs.confirm_reconcile == 'true'
        run: python3 scripts/reconcile_production_integrity.py --apply --confirm-reconcile
      - name: Verify repaired production state
        if: github.event.inputs.dry_run_only != 'true' && github.event.inputs.confirm_reconcile == 'true'
        run: python3 scripts/recover_production_sheets_threads_first.py --verify-only
