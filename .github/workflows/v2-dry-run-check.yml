name: v2 Dry-Run Safety Check

# workflow_dispatchのみ。scheduleは使用しない。
# 実API / 実投稿 / 実アップロードは一切行わない。
on:
  workflow_dispatch:
    inputs:
      account_id:
        description: "チェック対象アカウントID（例: night_scout）"
        required: false
        default: "night_scout"
      skip_gemini:
        description: "Gemini API疎通チェックをスキップ"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

# 安全制約: 全フラグを明示的にfalseで固定
env:
  PUBLISH_ENABLED: "false"
  ALLOW_REAL_X_POST: "false"
  ALLOW_REAL_THREADS_POST: "false"
  ALLOW_TRANSCRIPTION_API: "false"
  ALLOW_CLOUDINARY_UPLOAD: "false"
  DRY_RUN: "true"
  MOCK_LLM: "true"
  MOCK_SHEETS: "true"

jobs:
  dry-run-check:
    name: Dry-Run Safety Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
        continue-on-error: true

      - name: Verify safety flags
        run: |
          echo "=== 安全フラグ確認 ==="
          echo "PUBLISH_ENABLED=${PUBLISH_ENABLED}"
          echo "ALLOW_REAL_X_POST=${ALLOW_REAL_X_POST}"
          echo "ALLOW_REAL_THREADS_POST=${ALLOW_REAL_THREADS_POST}"
          echo "ALLOW_TRANSCRIPTION_API=${ALLOW_TRANSCRIPTION_API}"
          echo "ALLOW_CLOUDINARY_UPLOAD=${ALLOW_CLOUDINARY_UPLOAD}"
          echo "DRY_RUN=${DRY_RUN}"
          echo "MOCK_LLM=${MOCK_LLM}"
          echo "MOCK_SHEETS=${MOCK_SHEETS}"
          # 安全フラグがtrueになっていないことを確認
          if [ "${PUBLISH_ENABLED}" = "true" ]; then echo "ERROR: PUBLISH_ENABLED should be false" && exit 1; fi
          if [ "${ALLOW_REAL_X_POST}" = "true" ]; then echo "ERROR: ALLOW_REAL_X_POST should be false" && exit 1; fi
          if [ "${ALLOW_TRANSCRIPTION_API}" = "true" ]; then echo "ERROR: ALLOW_TRANSCRIPTION_API should be false" && exit 1; fi
          if [ "${ALLOW_CLOUDINARY_UPLOAD}" = "true" ]; then echo "ERROR: ALLOW_CLOUDINARY_UPLOAD should be false" && exit 1; fi
          echo "安全フラグ確認 OK"

      - name: Phase 2 tests
        run: python scripts/test_phase2.py
        continue-on-error: true

      - name: Phase 3 safety check
        run: python scripts/phase3_safety_check.py
        continue-on-error: true

      - name: Preflight check (quick, no API)
        run: python scripts/preflight_check.py --quick
        continue-on-error: true

      - name: Preflight video real test
        run: python scripts/preflight_video_real_test.py --mock
        continue-on-error: true

      - name: Preflight X real post check
        run: python scripts/preflight_x_real_post.py --mock
        continue-on-error: true

      - name: Pipeline integrity check
        run: python scripts/check_pipeline_integrity.py --mock
        continue-on-error: true

      - name: Learning integrity check
        run: python scripts/check_learning_integrity.py --mock
        continue-on-error: true

      - name: Phase 5 smoke plan dry-run
        env:
          ACCOUNT_ID: ${{ github.event.inputs.account_id }}
        run: python scripts/run_real_smoke_plan.py --step all --account-id "$ACCOUNT_ID"
        continue-on-error: true

      - name: Phase 5 ops foundation tests
        run: python scripts/test_phase50_56_real_ops_foundation.py
        continue-on-error: true

      - name: Post results learning loop tests
        run: python scripts/test_post_results_learning_loop.py
        continue-on-error: true

      - name: GitHub Actions workflow tests
        run: python scripts/test_github_actions_dry_run_workflow.py
        continue-on-error: true

      - name: Verify no real posts occurred
        run: |
          echo "=== 投稿状態確認 ==="
          echo "posted_results / queue.status=POSTED への変更がないことを確認"
          # posted_resultsタブへの変更はMOCK_SHEETS=trueのため発生しない
          echo "MOCK_SHEETS=${MOCK_SHEETS} → 実Sheetsへの書き込みなし"
          echo "検証OK: 実投稿は行われていません"

      - name: Summary
        if: always()
        run: |
          echo "=== Dry-Run Check Summary ==="
          echo "PUBLISH_ENABLED=false, ALLOW_REAL_X_POST=false を維持"
          echo "実API呼び出し: なし"
          echo "実投稿: なし"
          echo "実アップロード: なし"
          echo "詳細: docs/github-actions-dry-run-workflow.md"
