name: Approved Account Acquisition

on:
  schedule:
    - cron: "10 20 * * *"
  workflow_dispatch:
    inputs:
      confirm_acquisition:
        description: "Type true to acquire bounded approved account posts"
        required: true
        default: "false"

permissions:
  contents: read

concurrency:
  group: sns-growth-account-acquisition
  cancel-in-progress: false

env:
  PUBLISH_ENABLED: "false"
  ALLOW_REAL_THREADS_POST: "false"
  ALLOW_REAL_X_POST: "false"
  ALLOW_VIDEO_DOWNLOAD: "false"
  ALLOW_VIDEO_CUT: "false"
  ALLOW_CLOUDINARY_UPLOAD: "false"
  ALLOW_MEDIA_POSTS: "false"
  ALLOW_REAL_THREADS_VIDEO_POST: "false"
  ALLOW_TRANSCRIPTION_API: "false"

jobs:
  account-acquisition:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 35
    env:
      GCP_SA_JSON_BASE64: ${{ secrets.GCP_SA_JSON_BASE64 || secrets.SA_JSON_BASE64 }}
      SA_JSON_BASE64: ${{ secrets.SA_JSON_BASE64 || secrets.GCP_SA_JSON_BASE64 }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID || secrets.SNS_MASTER_SHEET_ID }}
      SNS_MASTER_SHEET_ID: ${{ secrets.SNS_MASTER_SHEET_ID || secrets.SPREADSHEET_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-acquisition.txt
      - name: Install pinned acquisition dependencies
        run: python3 -m pip install --requirement requirements-acquisition.txt
      - name: Install bounded public-browser backend
        run: python3 -m playwright install --with-deps chromium
      - name: Dry-run acquisition plan
        run: python3 scripts/acquire_approved_source_posts.py --account-id all --platform all --max-posts 3 --dry-run
      - name: Guard acquisition persistence
        if: github.event_name == 'schedule' || github.event.inputs.confirm_acquisition == 'true'
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          if json.loads(Path("config/autonomous_mode.json").read_text()).get("kill_switch"):
              raise SystemExit("[BLOCKED] kill_switch=true")
          print("[OK] approved bounded acquisition enabled")
          PY
          for name in SNS_MASTER_SHEET_ID SA_JSON_BASE64; do
            if [ -z "${!name}" ]; then echo "[BLOCKED] required secret is missing: $name"; exit 1; fi
          done
      - name: Acquire approved source bundles
        if: github.event_name == 'schedule' || github.event.inputs.confirm_acquisition == 'true'
        run: python3 scripts/acquire_approved_source_posts.py --account-id all --platform all --max-posts 3 --apply --confirm-acquisition
