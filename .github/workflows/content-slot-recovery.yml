name: Content Slot Recovery

on:
  schedule:
    # Every 30 minutes. The worker considers only slots overdue by 20 minutes.
    - cron: "0,30 * * * *"
  workflow_dispatch:
    inputs:
      confirm_recovery:
        description: "Type true to run one backfill maximum per account"
        required: true
        default: "false"
      dry_run_only:
        required: false
        default: "false"

permissions:
  contents: read
  actions: read
concurrency:
  group: sns-growth-production-recovery-${{ github.ref }}
  cancel-in-progress: false
env:
  PUBLISH_ENABLED: "false"
  ALLOW_REAL_THREADS_POST: "false"
  ALLOW_REAL_X_POST: "false"
  ALLOW_VIDEO_DOWNLOAD: "false"
  ALLOW_VIDEO_CUT: "false"
  ALLOW_CLOUDINARY_UPLOAD: "false"
  ALLOW_TRANSCRIPTION_API: "false"

jobs:
  recover-missed-slots:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 25
    env:
      GCP_SA_JSON_BASE64: ${{ secrets.GCP_SA_JSON_BASE64 || secrets.SA_JSON_BASE64 }}
      SA_JSON_BASE64: ${{ secrets.SA_JSON_BASE64 || secrets.GCP_SA_JSON_BASE64 }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID || secrets.SNS_MASTER_SHEET_ID }}
      SNS_MASTER_SHEET_ID: ${{ secrets.SNS_MASTER_SHEET_ID || secrets.SPREADSHEET_ID }}
      THREADS_ACCESS_TOKEN_NIGHT_SCOUT: ${{ secrets.THREADS_ACCESS_TOKEN_NIGHT_SCOUT }}
      THREADS_USER_ID_NIGHT_SCOUT: ${{ secrets.THREADS_USER_ID_NIGHT_SCOUT }}
      THREADS_ACCESS_TOKEN_LIVER_MANAGER: ${{ secrets.THREADS_ACCESS_TOKEN_LIVER_MANAGER }}
      THREADS_USER_ID_LIVER_MANAGER: ${{ secrets.THREADS_USER_ID_LIVER_MANAGER }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: {python-version: "3.11"}
      - run: pip install -r requirements.txt
      - name: Dry-run missed-slot scan
        run: python3 scripts/backfill_missed_content_slots.py --account-id all --dry-run
      - name: Guard and backfill at most one slot per account
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_recovery == 'true') && github.event.inputs.dry_run_only != 'true'
        env:
          PUBLISH_ENABLED: "true"
          ALLOW_REAL_THREADS_POST: "true"
          ALLOW_MEDIA_POSTS: "true"
          ALLOW_REAL_THREADS_VIDEO_POST: "true"
          ALLOW_THREADS_CAROUSEL: "true"
          ALLOW_THREADS_MIXED_CAROUSEL: "false"
          ALLOW_REAL_X_POST: "false"
          ALLOW_VIDEO_DOWNLOAD: "false"
          ALLOW_VIDEO_CUT: "false"
          ALLOW_CLOUDINARY_UPLOAD: "false"
          ALLOW_TRANSCRIPTION_API: "false"
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          if json.loads(Path('config/autonomous_mode.json').read_text()).get('kill_switch'):
              raise SystemExit('[BLOCKED] kill_switch=true')
          PY
          python3 scripts/backfill_missed_content_slots.py --account-id all --apply --confirm-backfill
