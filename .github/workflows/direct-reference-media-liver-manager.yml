name: Direct Reference Media Liver Manager

on:
  schedule:
    # JST 16:00, started 15 minutes early for bounded jitter.
    - cron: "45 6 * * *"
  workflow_dispatch:
    inputs:
      confirm_direct_media:
        description: "Type true to run the direct-media slot or its text fallback"
        required: true
        default: "false"
      dry_run_only:
        required: false
        default: "false"
      manual_e2e_proof:
        description: "One-time workflow_dispatch proof without claiming the scheduled slot"
        required: false
        default: "false"

permissions:
  contents: read
  actions: read
concurrency:
  group: sns-growth-production-liver-manager-${{ github.ref }}
  cancel-in-progress: false
env:
  ACCOUNT_ID: liver_manager
  PUBLISH_ENABLED: "false"
  ALLOW_REAL_THREADS_POST: "false"
  ALLOW_REAL_THREADS_VIDEO_POST: "false"
  ALLOW_MEDIA_POSTS: "false"
  ALLOW_REAL_X_POST: "false"
  ALLOW_VIDEO_DOWNLOAD: "false"
  ALLOW_VIDEO_CUT: "false"
  ALLOW_CLOUDINARY_UPLOAD: "false"
  ALLOW_TRANSCRIPTION_API: "false"

jobs:
  direct-reference-media:
    runs-on: [self-hosted, linux, x64, sns-growth, production]
    timeout-minutes: 60
    env:
      GCP_SA_JSON_BASE64: ${{ secrets.GCP_SA_JSON_BASE64 || secrets.SA_JSON_BASE64 }}
      SA_JSON_BASE64: ${{ secrets.SA_JSON_BASE64 || secrets.GCP_SA_JSON_BASE64 }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID || secrets.SNS_MASTER_SHEET_ID }}
      SNS_MASTER_SHEET_ID: ${{ secrets.SNS_MASTER_SHEET_ID || secrets.SPREADSHEET_ID }}
      THREADS_ACCESS_TOKEN_LIVER_MANAGER: ${{ secrets.THREADS_ACCESS_TOKEN_LIVER_MANAGER }}
      THREADS_USER_ID_LIVER_MANAGER: ${{ secrets.THREADS_USER_ID_LIVER_MANAGER }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Schedule heartbeat
        run: |
          echo "workflow=${{ github.workflow }}"
          echo "event=${{ github.event_name }}"
          date -u +"utc=%Y-%m-%dT%H:%M:%SZ"
      - run: pip install -r requirements.txt
      - name: Enforce scheduled posting window
        id: schedule_window
        if: github.event_name == 'schedule'
        run: python3 scripts/check_schedule_window.py --slot-id lm_1600_direct_media --write-github-output
      - name: Schedule jitter
        if: github.event_name == 'schedule' && steps.schedule_window.outputs.in_window == 'true'
        run: python3 -c 'import random,time; d=random.randint(0,1800); print(f"[jitter] sleeping {d}s within ±15min window"); time.sleep(d)'
      - name: Dry-run direct media plan
        continue-on-error: true
        if: github.event.inputs.manual_e2e_proof != 'true'
        run: python3 scripts/run_direct_reference_media_pipeline.py --account-id "$ACCOUNT_ID" --slot-id lm_1600_direct_media --dry-run --use-sheets
      - name: Dry-run manual direct-media E2E proof
        continue-on-error: true
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.manual_e2e_proof == 'true'
        run: python3 scripts/run_direct_reference_media_pipeline.py --account-id "$ACCOUNT_ID" --manual-e2e-proof --dry-run --use-sheets
      - name: Check free-tier media budget
        id: media_budget
        continue-on-error: true
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_direct_media == 'true') && github.event.inputs.dry_run_only != 'true' && (github.event_name != 'schedule' || steps.schedule_window.outputs.in_window == 'true')
        run: python3 scripts/check_media_resource_budget.py --use-sheets --check-cloudinary --apply --confirm-resource-usage --enforce --purpose post
      - name: Check media preparation budget
        id: preparation_budget
        continue-on-error: true
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_direct_media == 'true') && github.event.inputs.dry_run_only != 'true' && (github.event_name != 'schedule' || steps.schedule_window.outputs.in_window == 'true')
        run: python3 scripts/check_media_resource_budget.py --use-sheets --check-cloudinary --enforce --purpose prepare
      - name: Seed owner-attested media permissions
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_direct_media == 'true') && github.event.inputs.dry_run_only != 'true' && steps.media_budget.outcome == 'success' && github.event.inputs.manual_e2e_proof != 'true' && (github.event_name != 'schedule' || steps.schedule_window.outputs.in_window == 'true')
        run: python3 scripts/seed_owner_attested_media_permissions.py --apply --confirm-owner-attestation
      - name: Acquire bounded approved source posts
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_direct_media == 'true') && github.event.inputs.dry_run_only != 'true' && steps.media_budget.outcome == 'success' && github.event.inputs.manual_e2e_proof != 'true' && (github.event_name != 'schedule' || steps.schedule_window.outputs.in_window == 'true')
        continue-on-error: true
        run: python3 scripts/acquire_approved_source_posts.py --account-id "$ACCOUNT_ID" --max-posts 3 --apply --confirm-acquisition
      - name: Ingest one approved source-post media asset
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_direct_media == 'true') && github.event.inputs.dry_run_only != 'true' && steps.preparation_budget.outcome == 'success' && github.event.inputs.manual_e2e_proof != 'true' && (github.event_name != 'schedule' || steps.schedule_window.outputs.in_window == 'true')
        continue-on-error: true
        env:
          ALLOW_VIDEO_DOWNLOAD: "true"
          ALLOW_CLOUDINARY_UPLOAD: "true"
        run: python3 scripts/ingest_direct_reference_media.py --account-id "$ACCOUNT_ID" --apply --confirm-ingest
      - name: Apply direct media or text fallback
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_direct_media == 'true') && github.event.inputs.dry_run_only != 'true' && github.event.inputs.manual_e2e_proof != 'true' && (github.event_name != 'schedule' || steps.schedule_window.outputs.in_window == 'true')
        env:
          PUBLISH_ENABLED: "true"
          ALLOW_REAL_THREADS_POST: "true"
          ALLOW_REAL_THREADS_VIDEO_POST: "true"
          ALLOW_MEDIA_POSTS: "true"
          ALLOW_THREADS_CAROUSEL: "true"
          ALLOW_THREADS_MIXED_CAROUSEL: "false"
          ALLOW_VIDEO_DOWNLOAD: "false"
          ALLOW_CLOUDINARY_UPLOAD: "false"
          FORCE_TEXT_ONLY_FALLBACK: ${{ steps.media_budget.outcome != 'success' }}
        run: |
          python3 scripts/run_direct_reference_media_pipeline.py --account-id "$ACCOUNT_ID" --slot-id lm_1600_direct_media --apply --confirm-direct-media --fallback-to-text --use-sheets
      - name: Apply one manual direct-media E2E proof
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_direct_media == 'true' && github.event.inputs.manual_e2e_proof == 'true' && github.event.inputs.dry_run_only != 'true'
        env:
          PUBLISH_ENABLED: "true"
          ALLOW_REAL_THREADS_POST: "true"
          ALLOW_REAL_THREADS_VIDEO_POST: "true"
          ALLOW_MEDIA_POSTS: "true"
          ALLOW_THREADS_CAROUSEL: "true"
          ALLOW_THREADS_MIXED_CAROUSEL: "false"
          ALLOW_VIDEO_DOWNLOAD: "false"
          ALLOW_CLOUDINARY_UPLOAD: "false"
          ALLOW_REAL_X_POST: "false"
          FORCE_TEXT_ONLY_FALLBACK: ${{ steps.media_budget.outcome != 'success' }}
        run: python3 scripts/run_direct_reference_media_pipeline.py --account-id "$ACCOUNT_ID" --manual-e2e-proof --apply --confirm-direct-media --use-sheets
      - if: always()
        run: python3 scripts/check_autonomous_health.py --account-id "$ACCOUNT_ID" --dry-run --use-sheets
      - name: Clean expired transient media
        if: always()
        run: python3 scripts/cleanup_media_workspace.py --apply --confirm-cleanup
