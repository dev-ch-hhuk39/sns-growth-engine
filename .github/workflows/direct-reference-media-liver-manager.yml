name: Direct Reference Media Liver Manager

on:
  # Canary gate: prepared direct-media dispatch is manual until evidence is complete.
  workflow_dispatch:
    inputs:
      confirm_direct_media:
        description: "Type true to dispatch the prepared direct-media slot"
        required: true
        default: "false"
      dry_run_only:
        required: false
        default: "false"

permissions:
  contents: read
  actions: read

concurrency:
  group: sns-growth-production-liver-manager-${{ github.ref }}
  cancel-in-progress: false

env:
  ACCOUNT_ID: "liver_manager"
  CONTENT_SLOT_ID: "lm_1600_direct_media"
  PUBLISH_ENABLED: "false"
  ALLOW_REAL_THREADS_POST: "false"
  ALLOW_REAL_THREADS_VIDEO_POST: "false"
  ALLOW_MEDIA_POSTS: "false"
  ALLOW_REAL_X_POST: "false"
  ALLOW_VIDEO_DOWNLOAD: "false"
  ALLOW_VIDEO_CUT: "false"
  ALLOW_CLOUDINARY_UPLOAD: "false"
  ALLOW_TRANSCRIPTION_API: "false"

jobs:
  dispatch-prepared-direct-media:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    env:
      GCP_SA_JSON_BASE64: ${{ secrets.GCP_SA_JSON_BASE64 || secrets.SA_JSON_BASE64 }}
      SA_JSON_BASE64: ${{ secrets.SA_JSON_BASE64 || secrets.GCP_SA_JSON_BASE64 }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID || secrets.SNS_MASTER_SHEET_ID }}
      SNS_MASTER_SHEET_ID: ${{ secrets.SNS_MASTER_SHEET_ID || secrets.SPREADSHEET_ID }}
      THREADS_ACCESS_TOKEN_LIVER_MANAGER: ${{ secrets.THREADS_ACCESS_TOKEN_LIVER_MANAGER }}
      THREADS_USER_ID_LIVER_MANAGER: ${{ secrets.THREADS_USER_ID_LIVER_MANAGER }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ github.sha }}
      - name: Verify triggering revision
        run: |
          git checkout --detach "$GITHUB_SHA"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: {python-version: "3.11"}
      - name: Schedule heartbeat
        run: |
          echo "workflow=${{ github.workflow }}"
          echo "event=${{ github.event_name }}"
          echo "account=$ACCOUNT_ID"
          date -u +"utc=%Y-%m-%dT%H:%M:%SZ"
      - name: Install dispatcher dependencies
        run: python3 -m pip install --requirement requirements.txt
      - name: Diagnose schedule delay
        if: github.event_name == 'schedule'
        continue-on-error: true
        run: python3 scripts/check_schedule_window.py --slot-id "$CONTENT_SLOT_ID"
      - name: Dry-run prepared inventory
        run: python3 scripts/run_direct_reference_media_pipeline.py --account-id "$ACCOUNT_ID" --slot-id "$CONTENT_SLOT_ID" --post-ready --dry-run --use-sheets
      - name: Check free-tier post budget
        id: media_budget
        continue-on-error: true
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_direct_media == 'true') && github.event.inputs.dry_run_only != 'true'
        run: python3 scripts/check_media_resource_budget.py --use-sheets --apply --confirm-resource-usage --enforce --purpose post
      - name: Guard publisher, credentials, and kill switch
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_direct_media == 'true') && github.event.inputs.dry_run_only != 'true'
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          if json.loads(Path("config/autonomous_mode.json").read_text()).get("kill_switch"):
              raise SystemExit("[BLOCKED] kill_switch=true")
          print("[OK] kill_switch=false")
          PY
          for name in SNS_MASTER_SHEET_ID SA_JSON_BASE64 THREADS_ACCESS_TOKEN_LIVER_MANAGER THREADS_USER_ID_LIVER_MANAGER; do
            if [ -z "${!name}" ]; then echo "[BLOCKED] required secret is missing: $name"; exit 1; fi
          done
      - name: Dispatch one READY direct-media item or text fallback
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_direct_media == 'true') && github.event.inputs.dry_run_only != 'true'
        env:
          PUBLISH_ENABLED: "true"
          ALLOW_REAL_THREADS_POST: "true"
          ALLOW_REAL_THREADS_VIDEO_POST: "true"
          ALLOW_MEDIA_POSTS: "true"
          ALLOW_THREADS_CAROUSEL: "true"
          ALLOW_THREADS_MIXED_CAROUSEL: "false"
          ALLOW_REAL_X_POST: "false"
          ALLOW_VIDEO_DOWNLOAD: "false"
          ALLOW_VIDEO_CUT: "false"
          ALLOW_CLOUDINARY_UPLOAD: "false"
          FORCE_TEXT_ONLY_FALLBACK: ${{ steps.media_budget.outcome != 'success' }}
        run: python3 scripts/run_direct_reference_media_pipeline.py --account-id "$ACCOUNT_ID" --slot-id "$CONTENT_SLOT_ID" --post-ready --fallback-to-text --apply --confirm-direct-media --use-sheets
      - name: Health summary
        if: always()
        run: python3 scripts/check_autonomous_health.py --account-id "$ACCOUNT_ID" --dry-run --use-sheets
