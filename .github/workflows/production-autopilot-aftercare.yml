name: Production Autopilot Aftercare

on:
  schedule:
    # JST 23:40 daily. Runs after the scheduled posting windows.
    - cron: "40 14 * * *"
  workflow_dispatch:
    inputs:
      confirm_aftercare:
        description: "Type true to run production aftercare writes"
        required: true
        default: "false"
      dry_run_only:
        description: "Run plans only; never write Sheets"
        required: false
        default: "false"

permissions:
  contents: read
  actions: read

concurrency:
  group: production-autopilot-aftercare-${{ github.ref }}
  cancel-in-progress: false

env:
  PUBLISH_ENABLED: "false"
  ALLOW_REAL_X_POST: "false"
  ALLOW_REAL_THREADS_POST: "false"
  ALLOW_MEDIA_POSTS: "false"
  ALLOW_REAL_THREADS_VIDEO_POST: "false"
  ALLOW_VIDEO_DOWNLOAD: "false"
  ALLOW_VIDEO_CUT: "false"
  ALLOW_CLOUDINARY_UPLOAD: "false"
  ALLOW_TRANSCRIPTION_API: "false"

jobs:
  aftercare:
    name: Metrics / PDCA / Media discovery aftercare
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GCP_SA_JSON_BASE64: ${{ secrets.GCP_SA_JSON_BASE64 || secrets.SA_JSON_BASE64 }}
      SA_JSON_BASE64: ${{ secrets.SA_JSON_BASE64 || secrets.GCP_SA_JSON_BASE64 }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID || secrets.SNS_MASTER_SHEET_ID }}
      SNS_MASTER_SHEET_ID: ${{ secrets.SNS_MASTER_SHEET_ID || secrets.SPREADSHEET_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Schedule heartbeat
        run: |
          echo "workflow=${{ github.workflow }}"
          echo "event=${{ github.event_name }}"
          date -u +"utc=%Y-%m-%dT%H:%M:%SZ"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Guard aftercare config and secrets
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_aftercare == 'true') && github.event.inputs.dry_run_only != 'true'
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          cfg = json.loads(Path("config/production_autopilot.json").read_text())
          auto = json.loads(Path("config/autonomous_mode.json").read_text())
          if not cfg.get("production_autopilot_enabled"):
              raise SystemExit("[BLOCKED] production_autopilot_enabled=false")
          if auto.get("kill_switch"):
              raise SystemExit("[BLOCKED] autonomous kill_switch=true")
          print("[OK] aftercare accepted: production_autopilot_enabled=true kill_switch=false")
          PY
          if [ -z "$SNS_MASTER_SHEET_ID" ] && [ -z "$SPREADSHEET_ID" ]; then
            echo "[BLOCKED] Sheets spreadsheet secret is missing."
            exit 1
          fi
          if [ -z "$SA_JSON_BASE64" ] && [ -z "$GCP_SA_JSON_BASE64" ]; then
            echo "[BLOCKED] Sheets service account secret is missing."
            exit 1
          fi

      - name: Dry-run aftercare plan
        run: |
          python3 scripts/collect_threads_metrics.py --account-id all --source unavailable --dry-run
          python3 scripts/discover_approved_source_videos.py --account-id liver_manager --dry-run
          python3 scripts/run_media_growth_engine.py --account-id liver_manager --dry-run

      - name: Apply metrics snapshots
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_aftercare == 'true') && github.event.inputs.dry_run_only != 'true'
        run: |
          python3 scripts/collect_threads_metrics.py \
            --account-id all \
            --source browser \
            --browser-engine public \
            --apply \
            --confirm-metrics \
            --use-sheets

      - name: Sync source registry and Sheets schema
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_aftercare == 'true') && github.event.inputs.dry_run_only != 'true'
        run: |
          python3 scripts/seed_source_registry.py \
            --apply \
            --confirm-seed \
            --skip-setup \
            --target-account all \
            --platform all

      - name: Apply PDCA candidate generation
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_aftercare == 'true') && github.event.inputs.dry_run_only != 'true'
        run: |
          python3 scripts/generate_next_queue_from_metrics.py \
            --account-id night_scout \
            --count 2 \
            --apply \
            --confirm-generate \
            --use-sheets || true
          python3 scripts/generate_next_queue_from_metrics.py \
            --account-id liver_manager \
            --count 2 \
            --apply \
            --confirm-generate \
            --use-sheets || true

      - name: Apply approved media discovery and clip candidates
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_aftercare == 'true') && github.event.inputs.dry_run_only != 'true'
        run: |
          python3 scripts/discover_approved_source_videos.py \
            --account-id liver_manager \
            --fetch-real \
            --apply \
            --confirm-discovery \
            --use-sheets
          python3 scripts/run_media_growth_engine.py \
            --account-id liver_manager \
            --apply \
            --confirm-media-growth \
            --use-sheets

      - name: Health summary
        if: always()
        run: python3 scripts/check_autonomous_health.py --account-id all --dry-run
