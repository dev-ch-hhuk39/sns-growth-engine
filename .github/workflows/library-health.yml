name: OSS Library Health

on:
  schedule:
    - cron: "17 18 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sns-growth-library-health
  cancel-in-progress: true

jobs:
  library-health:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-oss.txt
      - name: Install pinned production and research dependencies
        run: python3 -m pip install --requirement requirements-oss.txt
      - name: Verify bounded core tools
        run: |
          python3 -m yt_dlp --version
          python3 -c 'from youtube_transcript_api import YouTubeTranscriptApi; from youtube_comment_downloader import YoutubeCommentDownloader; print("youtube_providers=ready")'
          ffmpeg -version | head -n 1
          ffprobe -version | head -n 1
          agent-reach doctor
      - name: Verify last30days exact revision and preflight
        run: |
          git clone --filter=blob:none https://github.com/mvanhorn/last30days-skill.git "$RUNNER_TEMP/last30days-skill"
          git -C "$RUNNER_TEMP/last30days-skill" checkout --detach 249c7a4c040558a903d6838dee31012980d4946d
          test "$(git -C "$RUNNER_TEMP/last30days-skill" rev-parse HEAD)" = "249c7a4c040558a903d6838dee31012980d4946d"
          python3 "$RUNNER_TEMP/last30days-skill/skills/last30days/scripts/last30days.py" --preflight
      - name: Validate library registry and provider contracts
        run: |
          python3 scripts/test_external_library_registry.py
          python3 scripts/test_provider_registry_capabilities.py
          python3 scripts/test_youtube_transcript_provider_contract.py
          python3 scripts/test_threads_comment_parser_post_bound.py
