name: CI Security and Regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sns-growth-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-acquisition.txt
      - name: Install pinned test dependencies
        run: python3 -m pip install --requirement requirements-acquisition.txt
      - name: Syntax and import compile check
        run: python3 -m compileall -q src scripts
      - name: Unit and integration tests
        run: python3 scripts/run_repository_tests.py --json-output /tmp/repository-tests.json
      - name: Workflow security and license contracts
        run: |
          python3 scripts/test_all_workflows_safety_flags.py
          python3 scripts/test_workflow_permissions_declared.py
          python3 scripts/test_library_capability_matrix_complete.py
          python3 scripts/test_external_library_registry.py

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: requirements.txt requirements-acquisition.txt requirements-media-runtime.txt

  secret-history-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
