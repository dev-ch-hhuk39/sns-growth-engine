name: Autonomous Growth Loop Night Scout

on:
  schedule:
    # Text-only slots: JST 14:00/16:00/25:00.
    # 18:00 is direct-reference media and 21:00 is generated clip media.
    # Cron starts 15 minutes before target; jitter sleeps 0-1800s.
    - cron: "45 4 * * *"
    - cron: "45 6 * * *"
    - cron: "45 15 * * *"
  workflow_dispatch:
    inputs:
      confirm_autonomous:
        description: "Type true to run night_scout autonomous Threads loop"
        required: true
        default: "false"
      skip_jitter:
        description: "Skip schedule jitter for manual dispatch"
        required: false
        default: "true"
      dry_run_only:
        description: "Run dry-run and health summary only; never apply/post"
        required: false
        default: "false"
      slot_id:
        description: "Canonical text slot for a manual proof"
        required: false
        default: "ns_1600_original"

permissions:
  contents: read
  actions: read

concurrency:
  group: sns-growth-production-night-scout-${{ github.ref }}
  cancel-in-progress: false

env:
  ACCOUNT_ID: "night_scout"
  PUBLISH_ENABLED: "false"
  ALLOW_REAL_X_POST: "false"
  ALLOW_REAL_THREADS_POST: "false"
  ALLOW_TRANSCRIPTION_API: "false"
  ALLOW_CLOUDINARY_UPLOAD: "false"
  ALLOW_VIDEO_DOWNLOAD: "false"
  ALLOW_VIDEO_CUT: "false"

jobs:
  autonomous-growth-loop-night-scout:
    name: Night Scout scheduled Threads autonomous loop
    runs-on: [self-hosted, linux, x64, sns-growth, production]
    timeout-minutes: 60

    env:
      GCP_SA_JSON_BASE64: ${{ secrets.GCP_SA_JSON_BASE64 || secrets.SA_JSON_BASE64 }}
      SA_JSON_BASE64: ${{ secrets.SA_JSON_BASE64 || secrets.GCP_SA_JSON_BASE64 }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID || secrets.SNS_MASTER_SHEET_ID }}
      SNS_MASTER_SHEET_ID: ${{ secrets.SNS_MASTER_SHEET_ID || secrets.SPREADSHEET_ID }}
      THREADS_ACCESS_TOKEN_NIGHT_SCOUT: ${{ secrets.THREADS_ACCESS_TOKEN_NIGHT_SCOUT }}
      THREADS_USER_ID_NIGHT_SCOUT: ${{ secrets.THREADS_USER_ID_NIGHT_SCOUT }}
      THREADS_ACCESS_TOKEN_LIVER_MANAGER: ${{ secrets.THREADS_ACCESS_TOKEN_LIVER_MANAGER }}
      THREADS_USER_ID_LIVER_MANAGER: ${{ secrets.THREADS_USER_ID_LIVER_MANAGER }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ github.sha }}
      - name: Verify triggering revision
        run: |
          git checkout --detach "$GITHUB_SHA"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Schedule heartbeat
        run: |
          echo "workflow=${{ github.workflow }}"
          echo "event=${{ github.event_name }}"
          echo "account=$ACCOUNT_ID"
          date -u +"utc=%Y-%m-%dT%H:%M:%SZ"

      - name: Resolve canonical content slot
        env:
          MANUAL_SLOT_ID: ${{ github.event.inputs.slot_id }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$MANUAL_SLOT_ID" ]; then
            slot="$MANUAL_SLOT_ID"
          else
            case "${{ github.event.schedule }}" in
              "45 4 * * *") slot="ns_1400_reference" ;;
              "45 6 * * *") slot="ns_1600_original" ;;
              "45 15 * * *") slot="ns_2500_pdca" ;;
              *) slot="manual_text" ;;
            esac
          fi
          echo "CONTENT_SLOT_ID=$slot" >> "$GITHUB_ENV"
          echo "content_slot=$slot"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Enforce scheduled posting window
        id: schedule_window
        if: github.event_name == 'schedule'
        run: python3 scripts/check_schedule_window.py --slot-id "$CONTENT_SLOT_ID" --write-github-output

      - name: Schedule jitter
        if: github.event_name == 'schedule' && steps.schedule_window.outputs.in_window == 'true'
        run: |
          python3 - <<'PY'
          import random, time
          delay = random.randint(0, 1800)
          print(f"[jitter] sleeping {delay}s within ±15min window")
          time.sleep(delay)
          PY

      - name: Dry-run autonomous plan
        run: python3 scripts/run_autonomous_loop.py --account-id "$ACCOUNT_ID" --slot-id "$CONTENT_SLOT_ID" --dry-run

      - name: Guard autonomous confirm and kill switch
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_autonomous == 'true') && github.event.inputs.dry_run_only != 'true' && (github.event_name != 'schedule' || steps.schedule_window.outputs.in_window == 'true')
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          cfg = json.loads(Path("config/autonomous_mode.json").read_text())
          if cfg.get("kill_switch"):
              raise SystemExit("[BLOCKED] autonomous kill_switch=true")
          print("[OK] autonomous schedule/confirm accepted and kill_switch=false")
          PY
          if [ -z "$SNS_MASTER_SHEET_ID" ] && [ -z "$SPREADSHEET_ID" ]; then
            echo "[BLOCKED] Sheets spreadsheet secret is missing."
            exit 1
          fi
          if [ -z "$SA_JSON_BASE64" ] && [ -z "$GCP_SA_JSON_BASE64" ]; then
            echo "[BLOCKED] Sheets service account secret is missing."
            exit 1
          fi

      - name: Apply autonomous Threads loop
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_autonomous == 'true') && github.event.inputs.dry_run_only != 'true' && (github.event_name != 'schedule' || steps.schedule_window.outputs.in_window == 'true')
        env:
          PUBLISH_ENABLED: "true"
          ALLOW_REAL_THREADS_POST: "true"
          ALLOW_REAL_X_POST: "false"
          ALLOW_VIDEO_DOWNLOAD: "false"
          ALLOW_VIDEO_CUT: "false"
          ALLOW_CLOUDINARY_UPLOAD: "false"
          ALLOW_TRANSCRIPTION_API: "false"
        run: |
          python3 scripts/run_autonomous_loop.py \
            --apply \
            --confirm-autonomous \
            --account-id "$ACCOUNT_ID" \
            --slot-id "$CONTENT_SLOT_ID"

      - name: Autonomous health summary
        if: always()
        continue-on-error: true
        run: python3 scripts/check_autonomous_health.py --account-id "$ACCOUNT_ID" --dry-run --use-sheets
