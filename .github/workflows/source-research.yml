name: OSS Source Research

on:
  schedule:
    - cron: "27 19 * * *"
  workflow_dispatch:
    inputs:
      confirm_research:
        description: "Type true to persist bounded research evidence"
        required: true
        default: "false"

permissions:
  contents: read

concurrency:
  group: sns-growth-source-research
  cancel-in-progress: false

env:
  PUBLISH_ENABLED: "false"
  ALLOW_REAL_THREADS_POST: "false"
  ALLOW_REAL_X_POST: "false"
  ALLOW_VIDEO_DOWNLOAD: "false"
  ALLOW_VIDEO_CUT: "false"
  ALLOW_CLOUDINARY_UPLOAD: "false"
  ALLOW_MEDIA_POSTS: "false"
  ALLOW_REAL_THREADS_VIDEO_POST: "false"
  ALLOW_TRANSCRIPTION_API: "false"

jobs:
  source-research:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GCP_SA_JSON_BASE64: ${{ secrets.GCP_SA_JSON_BASE64 || secrets.SA_JSON_BASE64 }}
      SA_JSON_BASE64: ${{ secrets.SA_JSON_BASE64 || secrets.GCP_SA_JSON_BASE64 }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID || secrets.SNS_MASTER_SHEET_ID }}
      SNS_MASTER_SHEET_ID: ${{ secrets.SNS_MASTER_SHEET_ID || secrets.SPREADSHEET_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-oss.txt
      - name: Install pinned research dependencies
        run: python3 -m pip install --requirement requirements-oss.txt
      - name: Checkout pinned last30days capability
        run: |
          git clone --filter=blob:none https://github.com/mvanhorn/last30days-skill.git "$RUNNER_TEMP/last30days-skill"
          git -C "$RUNNER_TEMP/last30days-skill" checkout --detach 249c7a4c040558a903d6838dee31012980d4946d
          test "$(git -C "$RUNNER_TEMP/last30days-skill" rev-parse HEAD)" = "249c7a4c040558a903d6838dee31012980d4946d"
          echo "LAST30DAYS_SCRIPT=$RUNNER_TEMP/last30days-skill/skills/last30days/scripts/last30days.py" >> "$GITHUB_ENV"
      - name: Dry-run research plan
        run: python3 scripts/run_source_research.py --account-id all --max-topics-per-account 1 --max-results 10 --dry-run
      - name: Guard research persistence
        if: github.event_name == 'schedule' || github.event.inputs.confirm_research == 'true'
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          if json.loads(Path("config/autonomous_mode.json").read_text()).get("kill_switch"):
              raise SystemExit("[BLOCKED] kill_switch=true")
          print("[OK] bounded research enabled")
          PY
          for name in SNS_MASTER_SHEET_ID SA_JSON_BASE64; do
            if [ -z "${!name}" ]; then echo "[BLOCKED] required secret is missing: $name"; exit 1; fi
          done
      - name: Persist research evidence only
        if: github.event_name == 'schedule' || github.event.inputs.confirm_research == 'true'
        run: python3 scripts/run_source_research.py --account-id all --max-topics-per-account 1 --max-results 10 --apply --confirm-research --use-sheets
