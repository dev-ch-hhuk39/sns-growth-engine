name: Media Growth Asset Preparation Night Scout

on:
  schedule:
    # JST 11:20 daily. This prepares an approved asset; it never posts.
    - cron: "20 2 * * *"
  workflow_dispatch:
    inputs:
      confirm_production_media:
        description: "Type true to prepare one approved night_scout media asset"
        required: true
        default: "false"
      dry_run_only:
        description: "Plan only; never download/cut/upload/post"
        required: false
        default: "false"

permissions:
  contents: read
  actions: read

concurrency:
  group: sns-growth-production-night-scout-${{ github.ref }}
  cancel-in-progress: false

env:
  ACCOUNT_ID: "night_scout"
  ALLOW_REAL_X_POST: "false"
  ALLOW_TRANSCRIPTION_API: "false"
  PUBLISH_ENABLED: "false"
  ALLOW_REAL_THREADS_POST: "false"
  ALLOW_VIDEO_DOWNLOAD: "false"
  ALLOW_VIDEO_CUT: "false"
  ALLOW_CLOUDINARY_UPLOAD: "false"
  ALLOW_MEDIA_POSTS: "false"
  ALLOW_REAL_THREADS_VIDEO_POST: "false"

jobs:
  media-growth-production-night-scout:
    runs-on: [self-hosted, linux, x64, sns-growth, production]
    timeout-minutes: 60
    env:
      GCP_SA_JSON_BASE64: ${{ secrets.GCP_SA_JSON_BASE64 || secrets.SA_JSON_BASE64 }}
      SA_JSON_BASE64: ${{ secrets.SA_JSON_BASE64 || secrets.GCP_SA_JSON_BASE64 }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID || secrets.SNS_MASTER_SHEET_ID }}
      SNS_MASTER_SHEET_ID: ${{ secrets.SNS_MASTER_SHEET_ID || secrets.SPREADSHEET_ID }}
      THREADS_ACCESS_TOKEN_NIGHT_SCOUT: ${{ secrets.THREADS_ACCESS_TOKEN_NIGHT_SCOUT }}
      THREADS_USER_ID_NIGHT_SCOUT: ${{ secrets.THREADS_USER_ID_NIGHT_SCOUT }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Schedule heartbeat
        run: |
          echo "workflow=${{ github.workflow }}"
          echo "event=${{ github.event_name }}"
          echo "account=$ACCOUNT_ID"
          date -u +"utc=%Y-%m-%dT%H:%M:%SZ"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install faster-whisper

      - name: Verify runner media tools
        run: |
          command -v ffmpeg
          command -v ffprobe
          ffmpeg -version | head -n 1

      - name: Guard rights, kill switch, config, and secrets
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_production_media == 'true') && github.event.inputs.dry_run_only != 'true'
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          media = json.loads(Path("config/media_growth_engine.json").read_text())
          auto = json.loads(Path("config/autonomous_mode.json").read_text())
          if auto.get("kill_switch"):
              raise SystemExit("[BLOCKED] kill_switch=true")
          required = ["download_enabled", "cut_enabled", "upload_enabled"]
          missing = [key for key in required if not media.get(key)]
          if missing:
              raise SystemExit("[BLOCKED] media config disabled: " + ",".join(missing))
          if "night_scout" not in media.get("allowed_target_account_ids", []):
              raise SystemExit("[BLOCKED] night_scout media account is disabled")
          print("[OK] approved media production config and kill switch")
          PY
          for name in SNS_MASTER_SHEET_ID SA_JSON_BASE64 CLOUDINARY_CLOUD_NAME CLOUDINARY_API_KEY CLOUDINARY_API_SECRET; do
            if [ -z "${!name}" ]; then
              echo "[BLOCKED] required secret is missing: $name"
              exit 1
            fi
          done

      - name: Dry-run media production plan
        run: python3 scripts/run_media_production_pipeline.py --account-id "$ACCOUNT_ID" --dry-run --use-sheets

      - name: Check free-tier media budget
        id: media_budget
        continue-on-error: true
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_production_media == 'true') && github.event.inputs.dry_run_only != 'true'
        run: python3 scripts/check_media_resource_budget.py --use-sheets --check-cloudinary --apply --confirm-resource-usage --enforce

      - name: Discover approved source videos
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_production_media == 'true') && github.event.inputs.dry_run_only != 'true' && steps.media_budget.outcome == 'success'
        run: |
          python3 scripts/discover_approved_source_videos.py \
            --account-id "$ACCOUNT_ID" --use-sheets --fetch-real --apply --confirm-discovery

      - name: Transcribe approved source videos
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_production_media == 'true') && github.event.inputs.dry_run_only != 'true' && steps.media_budget.outcome == 'success'
        env:
          ALLOW_VIDEO_DOWNLOAD: "true"
          ALLOW_LOCAL_TRANSCRIPTION: "true"
        run: |
          python3 scripts/transcribe_approved_source_videos.py \
            --account-id "$ACCOUNT_ID" --use-sheets --apply --confirm-transcribe \
            --allow-local-whisper --limit 3 --model-size tiny

      - name: Generate transcript-grounded clip candidates
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_production_media == 'true') && github.event.inputs.dry_run_only != 'true' && steps.media_budget.outcome == 'success'
        run: |
          python3 scripts/run_media_growth_engine.py \
            --account-id "$ACCOUNT_ID" --use-sheets --apply --confirm-media-growth

      - name: Prepare one approved media asset
        if: (github.event_name == 'schedule' || github.event.inputs.confirm_production_media == 'true') && github.event.inputs.dry_run_only != 'true' && steps.media_budget.outcome == 'success'
        env:
          PUBLISH_ENABLED: "false"
          ALLOW_REAL_THREADS_POST: "false"
          ALLOW_VIDEO_DOWNLOAD: "true"
          ALLOW_VIDEO_CUT: "true"
          ALLOW_CLOUDINARY_UPLOAD: "true"
          ALLOW_MEDIA_POSTS: "false"
          ALLOW_REAL_THREADS_VIDEO_POST: "false"
          ALLOW_REAL_X_POST: "false"
          ALLOW_TRANSCRIPTION_API: "false"
        run: |
          python3 scripts/run_media_production_pipeline.py \
            --account-id "$ACCOUNT_ID" --apply --confirm-production-media \
            --prepare-only --use-sheets

      - name: Clean expired transient media
        if: always()
        run: python3 scripts/cleanup_media_workspace.py --apply --confirm-cleanup

      - name: Health summary
        if: always()
        run: python3 scripts/check_autonomous_health.py --account-id "$ACCOUNT_ID" --dry-run --use-sheets
