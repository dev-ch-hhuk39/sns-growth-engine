name: Seed Approved Media Permissions

# Manual-only, narrow permission-ledger seeding. This never fetches, downloads,
# uploads, transcribes, cuts, or posts.
on:
  workflow_dispatch:
    inputs:
      confirm_owner_attestation:
        description: "Type true to seed only the five configured approved creator sources"
        required: true
        default: "false"

permissions:
  contents: read

env:
  PUBLISH_ENABLED: "false"
  ALLOW_REAL_THREADS_POST: "false"
  ALLOW_REAL_X_POST: "false"
  ALLOW_VIDEO_DOWNLOAD: "false"
  ALLOW_VIDEO_CUT: "false"
  ALLOW_CLOUDINARY_UPLOAD: "false"
  ALLOW_MEDIA_POSTS: "false"
  ALLOW_TRANSCRIPTION_API: "false"

jobs:
  seed-permissions:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    env:
      GCP_SA_JSON_BASE64: ${{ secrets.GCP_SA_JSON_BASE64 || secrets.SA_JSON_BASE64 }}
      SA_JSON_BASE64: ${{ secrets.SA_JSON_BASE64 || secrets.GCP_SA_JSON_BASE64 }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID || secrets.SNS_MASTER_SHEET_ID }}
      SNS_MASTER_SHEET_ID: ${{ secrets.SNS_MASTER_SHEET_ID || secrets.SPREADSHEET_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python3 -m pip install --requirement requirements.txt
      - name: Guard confirmation and Sheets credentials
        run: |
          test "${{ github.event.inputs.confirm_owner_attestation }}" = "true" || { echo "[BLOCKED] explicit confirmation required"; exit 1; }
          test -n "$SNS_MASTER_SHEET_ID" || test -n "$SPREADSHEET_ID" || { echo "[BLOCKED] Sheets spreadsheet secret is missing"; exit 1; }
          test -n "$SA_JSON_BASE64" || test -n "$GCP_SA_JSON_BASE64" || { echo "[BLOCKED] Sheets service account secret is missing"; exit 1; }
      - name: Seed explicit approved media permissions
        run: |
          python3 scripts/seed_owner_attested_media_permissions.py --apply --confirm-owner-attestation \
            --source-id src_ns_yt_cand_001 \
            --source-id src_lm_yt_user_001 \
            --source-id src_lm_tt_user_001 \
            --source-id src_lm_tt_user_002 \
            --source-id src_lm_tt_user_003
